name: Deploy Docs

on:
  push:
    branches: [main]
    paths:
      - 'include/**'
      - 'src/**'
      - 'docs/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - name: Install doxygen
      run: sudo apt-get update && sudo apt-get install -y doxygen

    - name: Generate API docs
      working-directory: docs
      run: doxygen Doxyfile 2>../doxygen-warnings.txt

    - name: Report doxygen warning count
      # Does not fail the build on existing warnings (there's a known
      # backlog documented in TESTING.md / Doxyfile).  Surfaces the
      # count so a sudden jump is visible in CI logs, and we can
      # flip this to a hard fail once the backlog reaches zero.
      run: |
        count=$(wc -l < doxygen-warnings.txt)
        echo "::notice::Doxygen produced ${count} warning lines"
        if [ "${count}" -gt 0 ]; then
          echo "First 20:"
          head -20 doxygen-warnings.txt
        fi

    - name: Build site
      run: |
        mkdir -p _site
        cp -r docs/api/html/* _site/

    - name: Upload artifact
      uses: actions/upload-pages-artifact@v5
      with:
        path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v5
