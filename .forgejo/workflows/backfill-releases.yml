# One-shot release backfill for tags (re-run 1) whose tagged commits predate
# the release.yml workflow.  Iterates through v0.8.0..v0.8.8 and
# POSTs each missing release to the Codeberg /releases API.  Safe
# to re-run -- the API returns 409 Conflict on duplicates which
# we ignore.
#
# Triggered by push to main; runs once after this workflow lands.
# Delete the file afterwards (or leave it; a re-run is a no-op).
name: Backfill releases

on:
  push:
    branches: [main]
    paths: ['.forgejo/workflows/backfill-releases.yml']
  workflow_dispatch:

jobs:
  backfill:
    runs-on: codeberg-tiny
    steps:
      - name: Checkout (full, for tags)
        uses: https://code.forgejo.org/actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Backfill v0.8.x releases
        env:
          CODEBERG_TOKEN: ${{ secrets.CODEBERG_TOKEN }}
        if: env.CODEBERG_TOKEN != ''
        run: |
          set -euo pipefail
          for tag in v0.8.0 v0.8.1 v0.8.2 v0.8.3 v0.8.4 v0.8.5 v0.8.6 v0.8.7 v0.8.8; do
            if ! git rev-parse "$tag" >/dev/null 2>&1; then
              echo "skip $tag: tag not found"
              continue
            fi
            body="$(git tag -l --format='%(contents:body)' "$tag")"
            if [ -z "$body" ]; then
              body="$(git tag -l --format='%(contents)' "$tag")"
            fi
            if [ -z "$body" ]; then
              body="Release $tag"
            fi
            payload=$(jq -n --arg tn "$tag" --arg name "Lime $tag" --arg body "$body" \
                        '{tag_name: $tn, name: $name, body: $body, draft: false, prerelease: false}')
            status=$(curl -s -o /tmp/resp.json -w '%{http_code}' \
              -X POST \
              -H "Authorization: token $CODEBERG_TOKEN" \
              -H 'Content-Type: application/json' \
              -d "$payload" \
              "https://codeberg.org/api/v1/repos/${GITHUB_REPOSITORY}/releases")
            case "$status" in
              201) echo "  $tag: created" ;;
              409) echo "  $tag: already exists" ;;
              *)   echo "  $tag: HTTP $status"; cat /tmp/resp.json; echo ;;
            esac
          done
