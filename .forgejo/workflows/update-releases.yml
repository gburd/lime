# One-shot: update existing v0.8.x Codeberg releases to use the
# full annotated-tag content (subject line + body) so they match
# the GitHub release bodies which already include the subject line.
#
# Idempotent.  Delete this file after it runs.
name: Update releases (one-shot)

on:
  push:
    branches: [main]
    paths: ['.forgejo/workflows/update-releases.yml']
  workflow_dispatch:

jobs:
  update:
    runs-on: codeberg-tiny
    steps:
      - name: Checkout (full, for tags)
        uses: https://code.forgejo.org/actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update v0.8.x release bodies
        env:
          CODEBERG_TOKEN: ${{ secrets.CODEBERG_TOKEN }}
        if: env.CODEBERG_TOKEN != ''
        run: |
          set -euo pipefail
          for tag in v0.8.0 v0.8.1 v0.8.2 v0.8.3 v0.8.4 v0.8.5 v0.8.6 v0.8.7 v0.8.8; do
            # Look up the release id for this tag
            id=$(curl -s \
              -H "Authorization: token $CODEBERG_TOKEN" \
              "https://codeberg.org/api/v1/repos/${GITHUB_REPOSITORY}/releases/tags/$tag" \
              | jq -r '.id // empty')
            if [ -z "$id" ]; then
              echo "  $tag: no release found"
              continue
            fi
            body="$(git log -1 --format='%b' "$tag")"
            if [ -z "$body" ]; then
              body="$(git tag -l --format='%(contents)' "$tag")"
            fi
            if [ -z "$body" ]; then
              body="Release $tag"
            fi
            payload=$(jq -n --arg name "Lime $tag" --arg body "$body" \
                        '{name: $name, body: $body}')
            status=$(curl -s -o /tmp/resp.json -w '%{http_code}' \
              -X PATCH \
              -H "Authorization: token $CODEBERG_TOKEN" \
              -H 'Content-Type: application/json' \
              -d "$payload" \
              "https://codeberg.org/api/v1/repos/${GITHUB_REPOSITORY}/releases/$id")
            case "$status" in
              200) echo "  $tag: updated (id=$id, body $(echo "$body" | wc -c) bytes)" ;;
              *)   echo "  $tag: HTTP $status"; cat /tmp/resp.json; echo ;;
            esac
          done
