when:
  branch: main
  event: [push, pull_request]

steps:
  build-gcc:
    image: debian:bookworm
    commands:
      - apt-get update && apt-get install -y gcc meson ninja-build pkg-config
      - gcc -O2 -Wall -Wextra -o lime lime.c
      - meson setup builddir
      - ninja -C builddir
      - meson test -C builddir --print-errorlogs

  build-clang:
    image: debian:bookworm
    commands:
      - apt-get update && apt-get install -y clang meson ninja-build pkg-config
      - CC=clang meson setup builddir-clang
      - ninja -C builddir-clang
      - meson test -C builddir-clang --print-errorlogs

  sanitizers:
    image: debian:bookworm
    commands:
      - apt-get update && apt-get install -y gcc meson ninja-build pkg-config
      - meson setup builddir-asan -Db_sanitize=address
      - ninja -C builddir-asan
      - meson test -C builddir-asan --print-errorlogs
      - meson setup builddir-ubsan -Db_sanitize=undefined
      - ninja -C builddir-ubsan
      - meson test -C builddir-ubsan --print-errorlogs

# Docs deployment is handled by .forgejo/workflows/pages.yml (Forgejo
# Actions + git-pages/action@v2). See Codeberg docs:
#   https://docs.codeberg.org/codeberg-pages/forgejo-actions/
